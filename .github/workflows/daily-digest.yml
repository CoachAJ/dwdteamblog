name: Daily Blog Digest

on:
  schedule:
    - cron: '0 12 * * *'  # 8:00 AM ET (UTC-4) every day
  workflow_dispatch:       # Allow manual trigger from GitHub Actions tab

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger digest endpoint
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.BLOG_URL }}/api/digest" \
            -H "Authorization: Bearer ${{ secrets.DIGEST_SECRET }}" \
            -H "Content-Type: application/json")
          echo "Response status: $RESPONSE"
          if [ "$RESPONSE" != "200" ]; then
            echo "Digest endpoint returned $RESPONSE — check your blog logs."
            exit 1
          fi
